<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자료공유</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="" />
  </div>

  <!-- QR 모달 -->
  <div class="qr-modal" id="qrModal">
    <div class="qr-box">
      <div id="qrCanvas"></div>
      <p id="qrLabel"></p>
      <button class="secondary qr-close" id="qrClose">닫기</button>
    </div>
  </div>

  <main class="app">
    <header>
      <div class="brand">
        <h1>자료공유</h1>
        <p>파일과 텍스트를 드래그앤드롭으로 빠르게 공유합니다.</p>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="themeBtn" title="다크모드 전환">🌙</button>
        <div class="badge" id="statusBadge">Supabase 연결 대기</div>
      </div>
    </header>

    <section class="grid">
      <!-- 파일 공유 -->
      <div class="card">
        <h2>파일 공유</h2>
        <label class="dropzone" id="dropzone">
          <input id="fileInput" type="file" multiple />
          <div>
            <strong>파일을 여기에 놓기</strong>
            <span>또는 클릭해서 선택 · 최대 50 MB<br />Ctrl+V 로 클립보드 이미지도 붙여넣기 가능</span>
          </div>
        </label>
        <div class="progress-wrap" id="progressWrap" hidden>
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="file-row">
          <label class="cam-btn">
            📷 카메라
            <input id="cameraInput" type="file" accept="image/*" capture="environment" />
          </label>
        </div>
        <div class="expiry-row">
          <span>만료:</span>
          <select id="fileExpiry">
            <option value="">만료 없음</option>
            <option value="60">1시간</option>
            <option value="1440">24시간</option>
            <option value="10080">7일</option>
          </select>
        </div>
      </div>

      <!-- 텍스트 공유 -->
      <div class="card">
        <h2>텍스트 공유</h2>
        <input id="titleInput" class="title-input" type="text" placeholder="제목 (선택 사항)" />
        <textarea id="textInput" placeholder="메모, 링크, 코드 조각… 마크다운 지원"></textarea>
        <div class="expiry-row">
          <span>만료:</span>
          <select id="textExpiry">
            <option value="">만료 없음</option>
            <option value="60">1시간</option>
            <option value="1440">24시간</option>
            <option value="10080">7일</option>
          </select>
        </div>
        <div class="actions">
          <button id="shareTextBtn">텍스트 공유</button>
          <button class="secondary" id="clearTextBtn">비우기</button>
        </div>
      </div>

      <!-- 공유된 자료 목록 -->
      <div class="card full">
        <div class="toolbar">
          <div class="toolbar-left">
            <h2 style="margin:0">공유된 자료</h2>
            <input type="search" id="searchInput" placeholder="검색…" />
          </div>
          <div class="toolbar-right">
            <select class="sort-select" id="sortSelect">
              <option value="newest">최신순</option>
              <option value="oldest">오래된순</option>
              <option value="size">크기순</option>
            </select>
            <button class="secondary" id="multiToggleBtn">선택</button>
            <button class="danger" id="multiDeleteBtn">선택 삭제</button>
          </div>
        </div>
        <div class="list" id="shareList"></div>
        <button class="secondary load-more" id="loadMoreBtn" hidden>더 보기</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
